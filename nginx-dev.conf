# ─────────────────────────────────────────────
#  Nginx config for dev.pinoypool.com
#
#  On your Hostinger server:
#  1. Copy this file to /etc/nginx/sites-available/pinoypool-dev
#  2. Enable it:
#       sudo ln -s /etc/nginx/sites-available/pinoypool-dev /etc/nginx/sites-enabled/
#  3. Test config:
#       sudo nginx -t
#  4. Reload Nginx:
#       sudo systemctl reload nginx
#  5. (Optional) Add SSL via Certbot:
#       sudo certbot --nginx -d dev.pinoypool.com
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name dev.pinoypool.com;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
